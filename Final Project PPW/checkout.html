<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Checkout | LensRent</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <a href="https://wa.me/6281234567890" class="whatsapp"> 💬 </a>

  <button onclick="topFunction()" id="topBtn">↑</button>

  <body>
    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index .html"> 📷 LensRent </a>
      </div>
    </nav>

    <!-- Checkout -->

    <section class="container py-5">
      <h2 class="text-center mb-5">Checkout Penyewaan</h2>

      <div class="row">
        <div class="col-lg-7">
          <div class="card shadow p-4">
            <h4 class="mb-4">Data Penyewa</h4>

            <form id="formBooking">
              <div class="mb-3">
                <label>Nama Lengkap</label>

                <input type="text" class="form-control" id="nama" required />
              </div>

              <div class="mb-3">
                <label>Email</label>

                <input type="email" class="form-control" id="email" required />
              </div>

              <div class="mb-3">
                <label>No HP</label>

                <input type="text" class="form-control" id="hp" required />
              </div>

              <div class="mb-3">
                <label>Tanggal Sewa</label>

                <input type="date" class="form-control" required />
              </div>

              <div class="mb-3">
                <label>Alamat</label>

                <textarea class="form-control" rows="4" required></textarea>
              </div>

              <div class="mb-3">
                <label>Metode Pembayaran</label>

                <select class="form-select">
                  <option>Transfer Bank</option>

                  <option>QRIS</option>

                  <option>Cash</option>
                </select>
              </div>

              <button type="submit" class="btn btn-warning w-100">
                Konfirmasi Booking
              </button>
            </form>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="card shadow p-4">
            <h4>Ringkasan Pesanan</h4>

            <hr />

            <table class="table">
              <tr>
                <td>Kamera</td>
                <td id="namaKamera"></td>
              </tr>

              <tr>
                <td>Harga / Hari</td>
                <td id="hargaKamera"></td>
              </tr>

              <tr>
                <td>Lama Sewa</td>
                <td id="lamaSewa"></td>
              </tr>

              <tr>
                <th>Total</th>
                <th class="text-danger" id="totalHarga"></th>
              </tr>
            </table>
          </div>
        </div>
      </div>
    </section>

    <footer class="bg-dark text-white text-center p-4">©2026 LensRent</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/script.js"></script>

    <script>
      document
        .getElementById("formBooking")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          alert("Booking berhasil!\n\nTerima kasih telah menyewa di LensRent.");

          window.location.href = "index.html";
        });
    </script>
  </body>
</html>
<script src="js/script.js"></script>
<script src="js/checkout.js"></script>
