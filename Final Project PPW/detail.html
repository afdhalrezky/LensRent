<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Kamera | LensRent</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">📷 LensRent</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="kamera.html">Kamera</a></li>
                    <li class="nav-item"><a class="nav-link" href="tentang.html">Tentang</a></li>
                    <li class="nav-item"><a class="nav-link" href="kontak.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Detail Kamera -->
    <section class="container py-5">
        <div class="row">
            <div class="col-lg-6 mb-4 mb-lg-0">
                <!-- Tambahkan ID gambarKamera agar bisa diubah js -->
                <img id="gambarKamera" src="" class="img-fluid rounded shadow detail-img" alt="Foto Produk">
            </div>

            <div class="col-lg-6">
                <!-- Tambahkan ID namaKamera -->
                <h2 id="namaKamera" class="fw-bold">Memuat data...</h2>
                
                <p class="text-muted">
                    Peralatan kamera profesional siap sewa untuk berbagai kebutuhan dokumentasi Anda.
                </p>

                <ul class="list-group mb-4">
                    <li class="list-group-item"><i class="bi bi-check-circle-fill text-success me-2"></i> Kondisi Terawat</li>
                    <li class="list-group-item"><i class="bi bi-battery-charging me-2"></i> Baterai Penuh</li>
                    <li class="list-group-item"><i class="bi bi-sd-card-fill me-2"></i> Termasuk Memory Card</li>
                </ul>

                <!-- Tambahkan ID hargaTampil -->
                <h3 id="hargaTampil" class="text-danger mb-4 fw-bold">Rp0 / Hari</h3>

                <div class="card shadow-sm p-4 border-0 bg-light">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Harga / Hari</label>
                        <input type="number" id="harga" class="form-control" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Lama Sewa (Hari)</label>
                        <input type="number" id="hari" class="form-control" value="1" min="1" oninput="hitungTotal()">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Total Pembayaran</label>
                        <input type="text" id="total" class="form-control fw-bold text-primary" readonly>
                    </div>

                    <button class="btn btn-warning w-100 py-2 fw-bold" onclick="sewaKamera()">
                        Sewa Sekarang
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-4">
        © 2026 LensRent
    </footer>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script Umum (Tempat dataKamera berada) -->
    <script src="js/script.js"></script>

    <!-- Logika Dinamis Detail Halaman -->
    <script>
        // 1. Ambil ID dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const idKamera = parseInt(urlParams.get('id'));

        // Variabel global untuk menyimpan data kamera yang dipilih
        let kameraTerpilih;

        // Pastikan variabel dataKamera dari js/script.js sudah terbaca
        if (typeof dataKamera !== 'undefined') {
            // 2. Cari kamera di array berdasarkan ID
            kameraTerpilih = dataKamera.find(k => k.id === idKamera);
        }

        // Jika ID tidak ditemukan, gunakan data pertama sebagai default
        if (!kameraTerpilih && typeof dataKamera !== 'undefined') {
            kameraTerpilih = dataKamera[0]; 
        }

        // 3. Tampilkan data ke halaman jika kameraTerpilih ada
        if (kameraTerpilih) {
            document.getElementById("gambarKamera").src = kameraTerpilih.gambar;
            document.getElementById("namaKamera").innerText = kameraTerpilih.nama;
            document.getElementById("hargaTampil").innerText = "Rp" + kameraTerpilih.harga.toLocaleString("id-ID") + " / Hari";
            document.getElementById("harga").value = kameraTerpilih.harga;
        }

        // 4. Fungsi Menghitung Total
        function hitungTotal() {
            let harga = document.getElementById("harga").value;
            let hari = document.getElementById("hari").value;
            let total = harga * hari;
            document.getElementById("total").value = "Rp " + total.toLocaleString("id-ID");
        }

        // Jalankan hitung total saat halaman pertama kali dibuka
        hitungTotal();

        // 5. Fungsi untuk tombol Sewa Sekarang
        function sewaKamera() {
            if (kameraTerpilih) {
                const kameraSewa = {
                    nama: kameraTerpilih.nama,
                    harga: kameraTerpilih.harga,
                    gambar: kameraTerpilih.gambar,
                    hari: Number(document.getElementById("hari").value)
                };
                
                // Simpan data dinamis ke localStorage
                localStorage.setItem("kamera", JSON.stringify(kameraSewa));
                
                // Pindah ke halaman checkout
                window.location.href = "checkout.html";
            } else {
                alert("Data kamera tidak ditemukan!");
            }
        }
    </script>
</body>
</html>
